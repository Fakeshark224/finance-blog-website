<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Prospr</title>
  <meta name="description" content="Admin Dashboard for Prospr">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <style>
    /* Admin specific styles */
    body { background-color: #f8f9fb; }
    
    .admin-gate {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(27, 42, 74, 0.95);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .admin-gate.open { opacity: 1; pointer-events: auto; }
    
    .admin-card {
      background: #fff; padding: var(--space-8); border-radius: 14px;
      width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .admin-card h2 { margin: var(--space-4) 0; color: var(--color-primary); }
    .admin-input { width: 100%; padding: 0.75rem; margin-bottom: var(--space-4); border: 1px solid var(--color-border); border-radius: 8px; font-family: inherit; }
    
    .admin-content { display: none; padding: var(--space-8) 0; }
    .admin-content.visible { display: block; }
    
    .admin-tabs {
      display: flex; border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-8);
      gap: var(--space-8);
    }
    .admin-tab {
      padding: var(--space-4) 0; font-weight: 600; color: var(--color-text-muted);
      cursor: pointer; position: relative;
    }
    .admin-tab.active { color: var(--color-primary); }
    .admin-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; width: 100%;
      height: 3px; background: var(--color-secondary); border-radius: 3px 3px 0 0;
    }
    
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-6); margin-bottom: var(--space-8); }
    .stat-card { background: #fff; border: 1px solid #e2e5ea; padding: var(--space-6); border-radius: 14px; text-align: center; }
    .stat-number { font-size: 3rem; font-weight: 700; color: var(--color-primary); line-height: 1; margin-bottom: var(--space-2); }
    .stat-label { color: var(--color-text-muted); font-weight: 500; }
    
    .admin-table-container { background: #fff; border: 1px solid #e2e5ea; border-radius: 14px; overflow: hidden; }
    .admin-table { width: 100%; border-collapse: collapse; text-align: left; }
    .admin-table th, .admin-table td { padding: 1rem; border-bottom: 1px solid #e2e5ea; }
    .admin-table th { background: #f8f9fb; font-weight: 600; color: var(--color-text-muted); }
    .admin-table tr:hover { background: #f8f9fb; }
    
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
    .badge-published { background: #e3fcef; color: #006644; }
    .badge-draft { background: #fffae6; color: #ff8b00; }
    
    .action-btn { color: var(--color-primary); font-weight: 600; margin-right: 1rem; text-decoration: none; cursor: pointer; }
    .action-btn.delete { color: #DE350B; }
    
    .error-msg { color: #DE350B; font-size: 0.875rem; margin-top: -0.5rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo" id="logo">prosp<span>.</span>r</a>
      <div class="header-actions">
        <div class="header-auth" id="header-auth"></div>
      </div>
    </div>
  </header>

  <!-- ========== PASSWORD GATE ========== -->
  <div class="admin-gate open" id="admin-gate">
    <div class="admin-card" id="gate-card">
      <h2 id="gate-title">Admin Access</h2>
      <p style="color:var(--color-text-muted); margin-bottom:1.5rem;" id="gate-subtitle">Verifying configuration...</p>
      
      <form id="gate-form" style="display:none;">
        <input type="password" id="gate-pw" class="admin-input" placeholder="Password" required>
        <input type="password" id="gate-pw-confirm" class="admin-input" placeholder="Confirm Password" style="display:none;">
        <div class="error-msg" id="gate-error">Invalid password.</div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="gate-submit">Unlock</button>
      </form>
    </div>
  </div>

  <!-- ========== ADMIN CONTENT ========== -->
  <div class="container admin-content" id="admin-content">
    
    <div class="admin-tabs">
      <div class="admin-tab active" data-target="tab-overview">Overview</div>
      <div class="admin-tab" data-target="tab-posts">Post Manager</div>
      <div class="admin-tab" data-target="tab-settings">Settings</div>
    </div>
    
    <!-- OVERVIEW TAB -->
    <div class="tab-pane active" id="tab-overview">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-number" id="stat-published">-</div>
          <div class="stat-label">Published Posts</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-drafts">-</div>
          <div class="stat-label">Draft Posts</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-views">-</div>
          <div class="stat-label">Total Views</div>
        </div>
      </div>
    </div>
    
    <!-- POSTS TAB -->
    <div class="tab-pane" id="tab-posts">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-6);">
        <h2 style="font-size:1.5rem;">All Posts</h2>
        <a href="create-post.html" class="btn btn-primary">Create New Post</a>
      </div>
      
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Status</th>
              <th>Views</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="posts-tbody">
            <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- SETTINGS TAB -->
    <div class="tab-pane" id="tab-settings">
      <div class="stat-card" style="max-width:500px; text-align:left;">
        <h2 style="font-size:1.5rem; margin-bottom:var(--space-4);">Change Password</h2>
        <form id="change-pw-form">
          <label class="stat-label" style="display:block; margin-bottom:0.5rem;">Current Password</label>
          <input type="password" id="cpw-current" class="admin-input" required>
          
          <label class="stat-label" style="display:block; margin-bottom:0.5rem;">New Password</label>
          <input type="password" id="cpw-new" class="admin-input" required>
          
          <label class="stat-label" style="display:block; margin-bottom:0.5rem;">Confirm New Password</label>
          <input type="password" id="cpw-confirm" class="admin-input" required>
          
          <div class="error-msg" id="cpw-msg"></div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </div>
    
  </div>

  <script src="firebase-config.js"></script>
  <script src="posts.js"></script>
  <script src="auth.js"></script>
  <script>
    // --- Admin Logic ---
    const AdminApp = (function() {
      const state = { mode: 'verify', isUnlocked: false };
      
      // DOM Elements
      const gate = document.getElementById('admin-gate');
      const gateForm = document.getElementById('gate-form');
      const gateSubtitle = document.getElementById('gate-subtitle');
      const gatePwConfirm = document.getElementById('gate-pw-confirm');
      const gateSubmit = document.getElementById('gate-submit');
      const gateError = document.getElementById('gate-error');
      const adminContent = document.getElementById('admin-content');
      
      // Utils
      async function hashPassword(pw) {
        const msgBuffer = new TextEncoder().encode(pw);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }
      
      async function getAdminConfig() {
        const doc = await firebase.firestore().collection('admin_config').doc('settings').get();
        return doc.exists ? doc.data() : null;
      }
      
      async function setAdminPassword(pw) {
        const hash = await hashPassword(pw);
        await firebase.firestore().collection('admin_config').doc('settings').set({
          adminPasswordHash: hash, failedAttempts: 0, lockoutUntil: null
        }, { merge: true });
      }
      
      async function verifyAdminPassword(pw) {
        const config = await getAdminConfig();
        if (!config || !config.adminPasswordHash) return { success: false, msg: 'No password set' };
        
        if (config.lockoutUntil && config.lockoutUntil.toDate() > new Date()) {
          const mins = Math.ceil((config.lockoutUntil.toDate() - new Date()) / 60000);
          return { success: false, msg: `Locked out. Try again in ${mins} minutes.` };
        }
        
        const hash = await hashPassword(pw);
        if (hash === config.adminPasswordHash) {
          if (config.failedAttempts > 0) {
            await firebase.firestore().collection('admin_config').doc('settings').update({ failedAttempts: 0, lockoutUntil: null });
          }
          return { success: true };
        } else {
          const fails = (config.failedAttempts || 0) + 1;
          const updates = { failedAttempts: fails };
          if (fails >= 3) {
            const lockoutDate = new Date();
            lockoutDate.setMinutes(lockoutDate.getMinutes() + 5);
            updates.lockoutUntil = firebase.firestore.Timestamp.fromDate(lockoutDate);
            await firebase.firestore().collection('admin_config').doc('settings').update(updates);
            return { success: false, msg: 'Too many failed attempts. Locked out for 5 minutes.' };
          }
          await firebase.firestore().collection('admin_config').doc('settings').update(updates);
          return { success: false, msg: 'Invalid password.' };
        }
      }
      
      async function init() {
        firebase.auth().onAuthStateChanged(async (user) => {
          if (!user || user.email !== window.ProsperAuth.ADMIN_EMAIL) {
            window.location.href = 'index.html';
            return;
          }
          
          const config = await getAdminConfig();
          gateForm.style.display = 'block';
          
          if (!config || !config.adminPasswordHash) {
            state.mode = 'setup';
            gateSubtitle.textContent = 'Create your admin password';
            gatePwConfirm.style.display = 'block';
            gatePwConfirm.required = true;
            gateSubmit.textContent = 'Set Password';
          } else {
            state.mode = 'verify';
            gateSubtitle.textContent = 'Enter admin password';
          }
        });
      }
      
      gateForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        gateError.style.display = 'none';
        gateSubmit.disabled = true;
        
        const pw = document.getElementById('gate-pw').value;
        
        if (state.mode === 'setup') {
          const cpw = document.getElementById('gate-pw-confirm').value;
          if (pw !== cpw) {
            gateError.textContent = 'Passwords do not match.';
            gateError.style.display = 'block';
            gateSubmit.disabled = false;
            return;
          }
          if (pw.length < 6) {
            gateError.textContent = 'Password must be at least 6 characters.';
            gateError.style.display = 'block';
            gateSubmit.disabled = false;
            return;
          }
          await setAdminPassword(pw);
          unlockDashboard();
        } else {
          const res = await verifyAdminPassword(pw);
          if (res.success) {
            unlockDashboard();
          } else {
            gateError.textContent = res.msg;
            gateError.style.display = 'block';
            gateSubmit.disabled = false;
          }
        }
      });
      
      function unlockDashboard() {
        gate.classList.remove('open');
        adminContent.classList.add('visible');
        state.isUnlocked = true;
        loadDashboardData();
      }
      
      // Tabs
      document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.target).classList.add('active');
        });
      });
      
      // Dashboard Data Loading
      async function loadDashboardData() {
        try {
          const snapshot = await firebase.firestore().collection('posts').orderBy('createdAt', 'desc').get();
          const posts = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
          
          let publishedCount = 0;
          let draftCount = 0;
          let totalViews = 0;
          
          const tbody = document.getElementById('posts-tbody');
          tbody.innerHTML = '';
          
          posts.forEach(post => {
            if (post.isDraft) draftCount++; else publishedCount++;
            totalViews += (post.viewCount || 0);
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td><strong>${post.title}</strong></td>
              <td>${post.category || 'N/A'}</td>
              <td><span class="badge ${post.isDraft ? 'badge-draft' : 'badge-published'}">${post.isDraft ? 'Draft' : 'Published'}</span></td>
              <td>${post.viewCount || 0}</td>
              <td>${post.createdAt ? post.createdAt.toDate().toLocaleDateString() : 'New'}</td>
              <td>
                <a href="create-post.html?edit=${post.id}" class="action-btn">Edit</a>
                <span class="action-btn delete" onclick="deletePostHandler('${post.id}')">Delete</span>
              </td>
            `;
            tbody.appendChild(tr);
          });
          
          document.getElementById('stat-published').textContent = publishedCount;
          document.getElementById('stat-drafts').textContent = draftCount;
          document.getElementById('stat-views').textContent = totalViews;
          
        } catch (e) {
          console.error('Error loading dashboard:', e);
        }
      }
      
      // Expose delete handler globally for onclick
      window.deletePostHandler = async function(id) {
        if (confirm('Are you sure you want to delete this post?')) {
          await window.ProsperPosts.deletePost(id);
          loadDashboardData();
        }
      };
      
      // Change Password form
      document.getElementById('change-pw-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('cpw-msg');
        msg.style.display = 'none';
        
        const cpw = document.getElementById('cpw-current').value;
        const npw = document.getElementById('cpw-new').value;
        const npwc = document.getElementById('cpw-confirm').value;
        
        if (npw !== npwc) {
          msg.textContent = 'New passwords do not match';
          msg.style.display = 'block';
          return;
        }
        
        const res = await verifyAdminPassword(cpw);
        if (!res.success) {
          msg.textContent = 'Current password incorrect';
          msg.style.display = 'block';
          return;
        }
        
        await setAdminPassword(npw);
        msg.style.color = '#006644';
        msg.textContent = 'Password updated successfully!';
        msg.style.display = 'block';
        document.getElementById('change-pw-form').reset();
      });
      
      return { init };
    })();
    
    document.addEventListener('DOMContentLoaded', AdminApp.init);
  </script>
</body>
</html>
